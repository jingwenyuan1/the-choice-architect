<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generator — The Choice Architect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="top-half">

  <header class="results-header">
    <a href="index.html" class="results-logo">The Choice Architect</a>
    <div class="results-header-right">
      <a href="collections.html" class="avatar-btn" aria-label="My outfits">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
        </svg>
      </a>
    </div>
  </header>

  <div class="outfit-detail-header">
    <div class="edit-name-container">
      <input type="text" class="cg-name-input" id="cgCollectionName" placeholder="New Outfit" autocomplete="off" spellcheck="false">
      <button class="edit-name-pencil" id="editNamePencil" aria-label="Edit outfit name">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
        </svg>
      </button>
    </div>
    <div class="attr-search-section">
      <span class="attr-search-label">Search a style</span>
      <input type="text" id="cgStyleInput" class="attr-search-input" placeholder="Search" autocomplete="off">
    </div>
  </div>

  <section class="products-section">
    <div class="products-scroll-wrapper" id="cgScrollWrapper">
      <div class="products-track cg-track" id="cgProductsGrid"></div>
    </div>
    <p class="cg-status-text" id="cgStatusText" aria-live="polite"></p>
  </section>

  <div class="nav-row">
    <div class="nav-row-left">
      <button class="nav-arrow-btn" id="cgPrevBtn" aria-label="Previous">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <button class="nav-arrow-btn" id="cgNextBtn" aria-label="Generate">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </div>
    <button class="save-changes-btn" id="saveChangesBtn">Save changes</button>
  </div>

  <div class="roll-section">
    <button class="roll-btn" id="cgGenerateBtn">GENERATE</button>
  </div>

  </div><!-- /.top-half -->

  <!-- ── Explore section (bottom half) ────────────────── -->
  <div id="exploreSection" class="explore-section">
    <button class="back-to-top-btn" id="backToTopBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="18 15 12 9 6 15"/></svg>
      Back to top
    </button>
    <p class="explore-section-label">Exploring similar to</p>
    <p class="explore-section-title" id="exploreSectionTitle"></p>

    <div class="filters-row">
      <div class="price-range-section">
        <span class="price-range-label">Price range</span>
        <div class="price-inputs">
          <span class="price-label">Min</span>
          <input type="number" id="explorePriceMin" class="price-input" min="0">
          <span class="price-label">Max</span>
          <input type="number" id="explorePriceMax" class="price-input" min="0">
          <button class="price-search-btn" id="explorePriceSearchBtn" aria-label="Apply price filter">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="attr-search-section">
        <span class="attr-search-label">Search another attribute</span>
        <input type="text" class="attr-search-input" id="exploreAttrInput" placeholder="Search" autocomplete="off">
      </div>
    </div>

    <section class="products-section">
      <div class="products-scroll-wrapper" id="exploreScrollWrapper">
        <div class="products-track" id="exploreGrid">
          <p class="no-results" id="exploreNoResults" style="display:none;">Loading…</p>
        </div>
      </div>
    </section>

    <div class="nav-row">
      <div class="nav-row-left">
        <button class="nav-arrow-btn" id="explorePrevBtn" aria-label="Undo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <button class="nav-arrow-btn" id="exploreNextBtn" aria-label="Roll">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="roll-section">
      <button class="roll-btn" id="exploreRollBtn">ROLL</button>
    </div>
  </div>

  <!-- ── Save to outfit modal ──────────────────── -->
  <div class="save-modal-overlay" id="saveModal" role="dialog" aria-modal="true">
    <div class="save-modal-box">
      <button class="save-modal-close" id="saveModalClose">&#x2715;</button>
      <h2 class="save-modal-title">Save to outfit</h2>
      <div class="save-modal-input-row">
        <input type="text" id="saveModalInput" class="save-modal-input" placeholder="New outfit name" autocomplete="off">
        <button class="save-modal-add-btn" id="saveModalAddBtn">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
            <line x1="1" y1="6" x2="11" y2="6" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="6" y1="1" x2="6" y2="11" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="save-modal-list" id="saveModalList"></div>
    </div>
  </div>

  <script>
    const API_BASE   = 'https://the-choice-architect-production-36b0.up.railway.app';
    const CATEGORIES = ['Tops', 'Bottoms', 'Outerwear', 'Shoes', 'Jewelry', 'Bags', 'Other'];

    const MATERIALS = ['cotton','polyester','satin','nylon','wool','linen','denim','leather','silk','spandex'];
    function randomMaterial() { return MATERIALS[Math.floor(Math.random() * MATERIALS.length)]; }
    function formatMaterial(m) { return m ? m.charAt(0).toUpperCase() + m.slice(1) : ''; }

    const CATEGORY_QUERY = {
      'Tops':      't-shirt tank top long sleeve shirt sweater sweatshirt pullover top blouse polo tee hoodie',
      'Bottoms':   'pants jeans shorts skirt leggings trousers joggers sweatpants chinos culottes bermuda capris',
      'Outerwear': 'jacket coat blazer parka cardigan windbreaker vest',
      'Shoes':     'shoes sneakers boots heels sandals loafers',
      'Jewelry':   'necklace earrings bracelet ring jewelry',
      'Bags':      'handbag tote bag backpack purse clutch',
      'Other':     'fashion accessory hat belt scarf sunglasses',
    };

    // Returns the most category-specific search query for a product.
    function getCategoryQueryForProduct(product) {
      if (!product) return '';
      const cat  = (product.category || '').toLowerCase().trim();
      const name = (product.name   || '').toLowerCase();
      // Exact key match (e.g. slot.category === 'Tops')
      if (CATEGORY_QUERY[product.category]) return CATEGORY_QUERY[product.category];
      // Category field contains a keyword from one of our buckets
      if (cat) {
        for (const q of Object.values(CATEGORY_QUERY)) {
          if (q.split(' ').some(kw => cat.includes(kw) || kw.includes(cat))) return q;
        }
        return cat; // use raw category as query (e.g. "dress", "kimono")
      }
      // Scan product name for known clothing keywords
      for (const q of Object.values(CATEGORY_QUERY)) {
        if (q.split(' ').some(kw => name.includes(kw))) return q;
      }
      return product.name.split(/\s+/).slice(0, 3).join(' ');
    }

    // Returns a specific query for a slot that preserves the product's exact type.
    // Uses the broad CATEGORY_QUERY bucket only for user-selected picker categories;
    // for all other slots (e.g. unlocked collection products) uses the raw product.category
    // field so a shirt stays a shirt rather than being replaced by any top.
    function getSpecificQuery(slot) {
      if (!slot) return '';
      if (CATEGORY_QUERY[slot.category]) return CATEGORY_QUERY[slot.category];
      const product = slot.product;
      if (!product) return '';
      if (product.category && !CATEGORY_QUERY[product.category]) return product.category;
      return product.name.split(/\s+/).slice(0, 4).join(' ');
    }

    // ── Icon SVGs ────────────────────────────────────────────────────────
    const LOCK_CLOSED_SVG = `<svg width="18" height="18" viewBox="0 0 15 26" fill="none" aria-hidden="true"><rect x="0" y="11" width="15" height="13" rx="1.5" fill="#fffaf5"/><path d="M2.5,13 L2.5,8 A5,5 0 0 1 12.5,8 L12.5,12.5" stroke="#fffaf5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const LOCK_OPEN_SVG   = `<svg width="18" height="18" viewBox="0 0 15 26" fill="none" aria-hidden="true"><rect x="0" y="11" width="15" height="13" rx="1.5" fill="#fffaf5"/><path d="M2.5,7 A5,5 0 0 1 12.5,8 L12.5,12.5" stroke="#fffaf5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const STAR_SVG        = `<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
    // Save icon — matches search.html (product generator): outline bookmark, 16×16
    const SAVE_SVG        = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;
    // Filled save icon — used for the persistent badge when slot is saved
    const SAVE_SVG_FILLED = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;

    // ── Outfits helpers ──────────────────────────────────────────────
    function getOutfits() {
      return JSON.parse(localStorage.getItem('tca_outfits') || '[]');
    }
    function saveOutfits(cs) {
      localStorage.setItem('tca_outfits', JSON.stringify(cs));
    }

    // ── State ────────────────────────────────────────────────────────────
    let collectionId       = '';
    let slots              = [];
    let savedSlots         = [];   // parallel to slots: true = saved to current collection
    let slotMaterials      = [];
    let slotMaterialLocked = [];
    let slotColorLocked    = [];
    let genHistory    = [];
    const FADE_MS     = 700;
    let isFading      = false;
    let isExploreFading = false;
    let hasGenerated  = false;

    // ── Explore section state ────────────────────────────────────────────
    let exploreSourceSlotIdx    = null;   // which top slot triggered EXPLORE MORE
    let exploreBaseProduct      = null;   // the product being explored
    let exploreRankedResults    = [];
    let exploreFilteredResults  = [];
    let exploreSlotProducts     = [null, null, null, null, null];
    let exploreSlotLocked       = [false, false, false, false, false];
    let exploreSlotColorLocked  = [false, false, false, false, false];
    let exploreColorFilterColors = new Set();
    let exploreNextIndex        = 0;
    let exploreRollHistory      = [];

    // ── Init ─────────────────────────────────────────────────────────────
    function loadFromPreloadOrCollection(coll) {
      let products = Array.isArray(coll.products) ? coll.products : [];
      try {
        const raw = localStorage.getItem('generatorProducts');
        if (raw) {
          localStorage.removeItem('generatorProducts');
          const preloadProducts = JSON.parse(raw);
          if (Array.isArray(preloadProducts) && preloadProducts.length > 0) {
            products = preloadProducts;
          }
        }
      } catch {}
      slots              = products.slice(0, 5).map(p => ({ type: 'locked', product: p }));
      savedSlots         = slots.map((_, i) => i === 0);
      slotMaterials      = slots.map(() => randomMaterial());
      slotMaterialLocked = slots.map(() => false);
      slotColorLocked    = slots.map(() => false);
      genHistory  = [];
      hasGenerated = false;
    }

    function showGrid() {
      document.getElementById('cgProductsGrid').style.opacity = '1';
    }

    (function init() {
      const params = new URLSearchParams(window.location.search);
      collectionId  = params.get('collection') || '';

      const cs   = getOutfits();
      const coll = cs.find(c => c.id === collectionId);
      if (!coll) { window.location.href = 'collections.html'; return; }

      const cgInput = document.getElementById('cgCollectionName');
      cgInput.value = coll.name || '';
      document.title = (coll.name || 'New Outfit') + ' — The Choice Architect';

      document.getElementById('cgProductsGrid').style.opacity = '0';
      loadFromPreloadOrCollection(coll);
      try { renderAll(); } catch (err) { console.error('renderAll error:', err); }
      requestAnimationFrame(() => requestAnimationFrame(showGrid));
    })();

    // Re-initialize when restored from bfcache so stale generator state is never shown
    window.addEventListener('pageshow', function (e) {
      if (!e.persisted) return;
      const cs   = getOutfits();
      const coll = cs.find(c => c.id === collectionId);
      if (!coll) return;
      loadFromPreloadOrCollection(coll);
      try { renderAll(); } catch (err) { console.error('renderAll error:', err); }
      showGrid();
    });

    function newPickerSlot() {
      return { type: 'picker', category: null, product: null,
               locked: false, resultsCache: null, lastQuery: null, resultIdx: 0 };
    }

    // ── Render (top section) ─────────────────────────────────────────────
    function renderAll(animate) {
      const grid = document.getElementById('cgProductsGrid');
      grid.innerHTML = '';

      let lastPickerIdx = -1;
      for (let i = slots.length - 1; i >= 0; i--) {
        if (slots[i].type === 'picker') { lastPickerIdx = i; break; }
      }

      slots.forEach((slot, i) => {
        const isSaved = savedSlots[i] || false;
        const tmp = document.createElement('div');
        let isCard = false;
        const mat    = slotMaterials[i]      || randomMaterial();
        const matLk  = slotMaterialLocked[i] || false;
        const colLk  = slotColorLocked[i]    || false;
        if (slot.type === 'locked') {
          tmp.innerHTML = buildLockedCardHTML(slot.product, i, isSaved, mat, matLk, colLk).trim();
          isCard = true;
        } else if (slot.product) {
          tmp.innerHTML = buildGeneratedCardHTML(slot.product, i, slot.locked, isSaved, mat, matLk, colLk).trim();
          isCard = true;
        } else {
          const canAdd  = slots.length < 5;
          tmp.innerHTML = buildPickerHTML(slot, i, canAdd).trim();
        }
        const el = tmp.firstElementChild;
        if (animate && isCard && (!(animate instanceof Set) || animate.has(i)))
          el.classList.add('card-fade-in');
        grid.appendChild(el);

        const gap = document.createElement('div');
        gap.className = 'cg-slot-gap';
        gap.innerHTML = slots.length < 5 ? `<button class="cg-slot-insert-btn" data-insert-after="${i}" aria-label="Add slot"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><line x1="1" y1="6" x2="11" y2="6" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/><line x1="6" y1="1" x2="6" y2="11" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/></svg></button>` : '';
        grid.appendChild(gap);
      });

      document.getElementById('cgScrollWrapper').scrollLeft = 0;
    }

    // ── Locked product card (from collection) ────────────────────────────
    // Now includes a full overlay with EXPLORE MORE above PRODUCT WEBPAGE.
    // Save icon: same outline bookmark as product generator page (same size & position).
    // Persistent save badge: filled bookmark, shown outside overlay when is-saved and not hovering.
    function buildLockedCardHTML(product, slotIdx, isSaved, material, isMaterialLocked, isColorLocked) {
      const imgSrc    = product.image_url;
      const nameEsc   = product.name.replace(/&/g, '&amp;').replace(/</g, '&lt;');
      const rawColor  = product.color;
      const colorText = (rawColor && rawColor !== 'other')
        ? 'Color: ' + rawColor.charAt(0).toUpperCase() + rawColor.slice(1)
        : 'Color: Multicolor';
      const priceText = product.price != null ? '$' + Number(product.price).toFixed(2) : '$Price';
      const href      = product.link || '#';
      const linkAttrs = product.link ? ' target="_blank" rel="noopener"' : '';

      return `<div class="product-card is-locked${isSaved ? ' is-saved' : ''}" data-slot-idx="${slotIdx}">
        <img class="product-img" src="${imgSrc}" alt="${nameEsc}" loading="lazy">
        <button class="persistent-lock" aria-label="Locked">${LOCK_CLOSED_SVG}</button>
        <div class="card-overlay">
          <div class="overlay-top">
            <button class="close-btn cg-dismiss-btn" data-slot-idx="${slotIdx}" aria-label="Remove slot">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                <line x1="1" y1="1" x2="11" y2="11" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="11" y1="1" x2="1" y2="11" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
            <div class="dots-grid">
              <div class="dot"></div><div class="dot"></div><div class="dot"></div>
              <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div style="width:24px;"></div>
          </div>
          <button class="cg-locked-unlock-btn" data-slot-idx="${slotIdx}" aria-label="Unlock">${LOCK_CLOSED_SVG}</button>
          <div class="card-info">
            <div class="card-info-frozen">
              <h3 class="product-name">${nameEsc}</h3>
              <span class="product-brand">Brand name</span>
              <div class="product-price-rating">
                <span>${priceText}</span>
                <span class="product-rating">${STAR_SVG} 5.0</span>
              </div>
            </div>
            <div class="card-attrs-scroll">
              <div class="product-color-row">
                <span class="product-detail color-label">${colorText}</span>
                <button class="icon-btn cg-color-lock-btn" data-slot-idx="${slotIdx}" aria-label="${isColorLocked ? 'Unlock color' : 'Lock color'}">${isColorLocked ? LOCK_CLOSED_SVG : LOCK_OPEN_SVG}</button>
              </div>
              <div class="product-material-row">
                <span class="product-detail material-label">Material: ${formatMaterial(material)}</span>
                <button class="icon-btn cg-material-lock-btn" data-slot-idx="${slotIdx}" aria-label="${isMaterialLocked ? 'Unlock material' : 'Lock material'}">${isMaterialLocked ? LOCK_CLOSED_SVG : LOCK_OPEN_SVG}</button>
              </div>
            </div>
          </div>
          <div class="card-footer-stack">
            <div class="card-footer">
              <button class="explore-more-btn" data-slot-idx="${slotIdx}">EXPLORE MORE</button>
              <div style="width: 27px; flex-shrink: 0;"></div>
            </div>
            <div class="card-footer">
              <a href="${href}"${linkAttrs} class="product-webpage-btn">Product Webpage</a>
              <button class="save-btn cg-save-btn" data-slot-idx="${slotIdx}" aria-label="Save to outfit">${SAVE_SVG}</button>
            </div>
          </div>
        </div>
      </div>`;
    }

    // ── Category picker card ─────────────────────────────────────────────
    function buildPickerHTML(slot, slotIdx, canAdd) {
      const rows = CATEGORIES.map((cat, idx) => {
        const sel = slot.category === cat ? ' is-selected' : '';
        const div = idx < CATEGORIES.length - 1 ? '<div class="picker-divider"></div>' : '';
        return `<div class="picker-cat-row${sel}" data-slot-idx="${slotIdx}" data-cat="${cat}">${cat}</div>${div}`;
      }).join('');

      const addStyle = canAdd ? '' : ' style="display:none!important"';
      return `<div class="picker-slot${slot.category ? ' has-selection' : ''}" data-slot-idx="${slotIdx}">
        <button class="close-btn cg-dismiss-btn" data-slot-idx="${slotIdx}" aria-label="Remove slot" style="position:absolute;top:9px;left:9px;z-index:5;">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
            <line x1="1" y1="1" x2="11" y2="11" stroke="#736a5c" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="11" y1="1" x2="1" y2="11" stroke="#736a5c" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="picker-categories">${rows}</div>
        <button class="picker-add-btn" data-slot-idx="${slotIdx}"${addStyle} aria-label="Add slot"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><line x1="1" y1="6" x2="11" y2="6" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/><line x1="6" y1="1" x2="6" y2="11" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/></svg></button>
      </div>`;
    }

    // ── Generated product card ────────────────────────────────────────────
    // EXPLORE MORE button sits above PRODUCT WEBPAGE (same size, rounded corners, font).
    // Persistent save badge: filled bookmark, visible when is-saved and not hovering.
    function buildGeneratedCardHTML(product, slotIdx, isLocked, isSaved, material, isMaterialLocked, isColorLocked) {
      const imgSrc   = product.image_url;
      const nameEsc  = product.name.replace(/&/g, '&amp;').replace(/</g, '&lt;');
      const rawColor = product.color;
      const colorText = (rawColor && rawColor !== 'other')
        ? 'Color: ' + rawColor.charAt(0).toUpperCase() + rawColor.slice(1)
        : 'Color: Multicolor';
      const priceText = product.price != null ? '$' + Number(product.price).toFixed(2) : '$Price';
      const href      = product.link || '#';
      const linkAttrs = product.link ? ' target="_blank" rel="noopener"' : '';

      const lockBtn = `<button class="icon-btn cg-lock-btn" data-slot-idx="${slotIdx}" aria-label="${isLocked ? 'Unlock' : 'Lock'}">${isLocked ? LOCK_CLOSED_SVG : LOCK_OPEN_SVG}</button>`;
      const persistBadge = isLocked
        ? `<button class="cg-lock-btn persistent-lock" data-slot-idx="${slotIdx}" aria-label="Unlock">${LOCK_CLOSED_SVG}</button>`
        : '';

      return `<div class="product-card${isLocked ? ' is-locked' : ''}${isSaved ? ' is-saved' : ''}" data-slot-idx="${slotIdx}">
        <img class="product-img" src="${imgSrc}" alt="${nameEsc}" loading="lazy">
        ${persistBadge}
        <div class="card-overlay">
          <div class="overlay-top">
            <button class="close-btn cg-dismiss-btn" data-slot-idx="${slotIdx}" aria-label="Reset slot">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                <line x1="1" y1="1" x2="11" y2="11" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="11" y1="1" x2="1" y2="11" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
            <div class="dots-grid">
              <div class="dot"></div><div class="dot"></div><div class="dot"></div>

            </div>

    }

    // ── Explore section card (ADD PRODUCT above PRODUCT WEBPAGE, no save) ─
    function buildExploreCardHTML(product, slotIdx, isLocked) {
      const imgSrc   = product.image_url;
      const nameEsc  = product.name.replace(/&/g, '&amp;').replace(/</g, '&lt;');
      const rawColor = product.color;
      const colorText = (rawColor && rawColor !== 'other')
        ? 'Color: ' + rawColor.charAt(0).toUpperCase() + rawColor.slice(1)
        : 'Color: Multicolor';
      const priceText = product.price != null ? '$' + Number(product.price).toFixed(2) : '$Price';
      const href      = product.link || '#';
      const linkAttrs = product.link ? ' target="_blank" rel="noopener"' : '';

      const lockBtn = `<button class="icon-btn cg-explore-lock-btn" data-slot="${slotIdx}" aria-label="${isLocked ? 'Unlock' : 'Lock'}">${isLocked ? LOCK_CLOSED_SVG : LOCK_OPEN_SVG}</button>`;
      const persistBadge = isLocked
        ? `<button class="cg-explore-lock-btn persistent-lock" data-slot="${slotIdx}" aria-label="Unlock">${LOCK_CLOSED_SVG}</button>`
        : '';

      const persistDismiss = `<button class="persistent-dismiss cg-explore-dismiss-btn" data-slot="${slotIdx}" aria-label="Remove">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none" aria-hidden="true">
          <line x1="1" y1="1" x2="11" y2="11" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="11" y1="1" x2="1" y2="11" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>`;

      return `<div class="product-card${isLocked ? ' is-locked' : ''}" data-id="${product.id}" data-slot="${slotIdx}">
        <img class="product-img" src="${imgSrc}" alt="${nameEsc}" loading="lazy">
        ${persistDismiss}
        ${persistBadge}
        <div class="card-overlay">
          <div class="overlay-top">
            <button class="close-btn cg-explore-dismiss-btn" aria-label="Remove" data-slot="${slotIdx}">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                <line x1="1" y1="1" x2="11" y2="11" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="11" y1="1" x2="1" y2="11" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
            <div class="dots-grid">
              <div class="dot"></div><div class="dot"></div><div class="dot"></div>
              <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            ${lockBtn}
          </div>
          <div class="card-info">
            <h3 class="product-name">${nameEsc}</h3>
            <span class="product-brand">Brand name</span>
            <div class="product-price-rating">
              <span>${priceText}</span>
              <span class="product-rating">${STAR_SVG} 5.0</span>
            </div>
            <div class="product-color-row">
              <span class="product-detail color-label">${colorText}</span>
            </div>
          </div>
          <div class="card-footer-stack">
            <button class="add-product-btn" data-slot="${slotIdx}">ADD PRODUCT</button>
            <div class="card-footer">
              <a href="${href}"${linkAttrs} class="product-webpage-btn">Product Webpage</a>
              <button class="save-btn cg-explore-save-btn" data-slot="${slotIdx}" aria-label="Save to outfit">${SAVE_SVG}</button>
            </div>
          </div>
        </div>
      </div>`;
    }

    // ── Render explore slots ─────────────────────────────────────────────
    function renderExploreSlots(animate) {
      const grid      = document.getElementById('exploreGrid');
      const noResults = document.getElementById('exploreNoResults');
      grid.querySelectorAll('.product-card').forEach(c => c.remove());

      const filled = exploreSlotProducts.filter(Boolean);
      if (filled.length === 0) {
        noResults.style.display = 'block';
        return;
      }
      noResults.style.display = 'none';
      exploreSlotProducts.forEach((product, i) => {
        if (!product) return;
        const tmp = document.createElement('div');
        tmp.innerHTML = buildExploreCardHTML(product, i, exploreSlotLocked[i]).trim();
        const el = tmp.firstElementChild;
        if (animate && (!(animate instanceof Set) || animate.has(i))) el.classList.add('card-fade-in');
        grid.insertBefore(el, noResults);
      });
      document.getElementById('exploreScrollWrapper').scrollLeft = 0;
    }

    // ── GENERATE ─────────────────────────────────────────────────────────
    function fadeOutChanging(indices) {
      const grid = document.getElementById('cgProductsGrid');
      grid.querySelectorAll('[data-slot-idx]').forEach(el => {
        if (indices.has(parseInt(el.dataset.slotIdx, 10))) {
          el.style.transition = 'opacity 350ms linear';
          el.style.opacity    = '0';
        }
      });
    }

    async function doGenerate() {
      const styleQuery = document.getElementById('cgStyleInput').value.trim();
      const toFill = slots.filter(s => s.type === 'picker' && !s.locked);
      if (toFill.length === 0 || isFading) return;
      // Block if any picker slot still has no category chosen (selection list still open)
      if (slots.some(s => s.type === 'picker' && !s.locked && !s.category)) return;
      isFading = true;

      const changingIndices = new Set(
        slots.reduce((acc, s, i) => { if (s.type === 'picker' && !s.locked) acc.push(i); return acc; }, [])
      );
      fadeOutChanging(changingIndices);

      hasGenerated = true;

      genHistory.push(JSON.parse(JSON.stringify(
        slots.map(s => ({ ...s, resultsCache: null }))
      )));
      if (genHistory.length > 50) genHistory.shift();

      const pinnedIds = new Set(
        slots.filter(s => s.type === 'locked' || (s.type === 'picker' && s.locked && s.product))
             .map(s => s.product.id)
      );

      await Promise.all([
        new Promise(r => setTimeout(r, 350)),
        (async () => {
          for (const slot of toFill) {
            const baseQuery = getSpecificQuery(slot);
            if (!baseQuery) continue;
            const q = (styleQuery ? styleQuery + ' ' + baseQuery : baseQuery).toLowerCase();

            if (!slot.resultsCache || slot.lastQuery !== q) {
              try {
                const resp = await fetch(`${API_BASE}/search?q=${encodeURIComponent(q)}&k=50`);
                if (!resp.ok) continue;
                slot.resultsCache = await resp.json();
                slot.lastQuery    = q;
                slot.resultIdx    = 0;
              } catch { continue; }
            }

            if (!slot.resultsCache || slot.resultsCache.length === 0) continue;
            let pool = slot.resultsCache.filter(p => !pinnedIds.has(p.id));
            if (pool.length === 0) continue;

            const slotI = slots.indexOf(slot);
            if (slotColorLocked[slotI] && slot.product && slot.product.color && slot.product.color !== 'other') {
              const colorPool = pool.filter(p => p.color === slot.product.color);
              if (colorPool.length > 0) pool = colorPool;
            }

            const pick = pool[slot.resultIdx % pool.length];
            slot.resultIdx = (slot.resultIdx + 1) % pool.length;
            slot.product   = pick;
            pinnedIds.add(pick.id);
          }
        })(),
      ]);

      slots.forEach((slot, i) => {
        if (slot.type === 'picker' && !slot.locked && !slotMaterialLocked[i] && slot.product) {
          slotMaterials[i] = randomMaterial();
        }
      });

      renderAll(changingIndices);
      setTimeout(() => { isFading = false; }, 700);
    }

    async function doUndo() {
      if (genHistory.length === 0 || isFading) return;
      isFading = true;

      const changingIndices = new Set(
        slots.reduce((acc, s, i) => { if (s.type !== 'locked') acc.push(i); return acc; }, [])
      );
      fadeOutChanging(changingIndices);
      await new Promise(r => setTimeout(r, 350));

      const snap = genHistory.pop();
      snap.forEach((s, i) => {
        if (slots[i]) {
          slots[i].category  = s.category;
          slots[i].product   = s.product;
          slots[i].locked    = s.locked;
          slots[i].resultIdx = s.resultIdx;
        }
      });
      renderAll(changingIndices);
      setTimeout(() => { isFading = false; }, 700);
    }

    // ── Explore MORE — open bottom half ─────────────────────────────────
    async function openExploreSection(slotIdx) {
      const slot    = slots[slotIdx];
      const product = slot && (slot.product || (slot.type === 'locked' ? slot.product : null));
      if (!product) return;

      exploreSourceSlotIdx = slotIdx;
      exploreBaseProduct   = product;

      // Set title
      document.getElementById('exploreSectionTitle').textContent = product.name;

      // Seed explore grid: product in slot 0 (locked), rest empty for now
      exploreSlotProducts    = [product, null, null, null, null];
      exploreSlotLocked      = [true, false, false, false, false];
      exploreSlotColorLocked = [false, false, false, false, false];
      exploreColorFilterColors.clear();
      exploreRollHistory     = [];
      exploreNextIndex       = 0;
      renderExploreSlots();

      // Show section
      const section = document.getElementById('exploreSection');
      section.classList.add('is-visible');

      // Scroll to the explore section
      requestAnimationFrame(() => {
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });

      // Fetch same-category products
      await fetchExploreProducts();
    }

    async function fetchExploreProducts() {
      if (!exploreBaseProduct) return;

      const pid = exploreBaseProduct.id;

      try {
        const url  = `${API_BASE}/search_by_image?url=${encodeURIComponent(exploreBaseProduct.image_url)}&k=200&exclude=${encodeURIComponent(pid)}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('Server ' + resp.status);
        const data = await resp.json();
        exploreRankedResults   = data;
        exploreFilteredResults = data.filter(p => p.id !== pid);
        exploreSlotProducts = [
          exploreBaseProduct,
          exploreFilteredResults[0] || null,
          exploreFilteredResults[1] || null,
          exploreFilteredResults[2] || null,
          exploreFilteredResults[3] || null,
        ];
        exploreNextIndex = Math.min(4, exploreFilteredResults.length);
        renderExploreSlots();
      } catch (err) {
        const el = document.getElementById('exploreNoResults');
        el.style.display = 'block';
        el.textContent   = 'Could not load similar products.';
      }
    }

    // ── Explore price filter ─────────────────────────────────────────────
    async function applyExplorePriceFilter() {
      const min = parseFloat(document.getElementById('explorePriceMin').value);
      const max = parseFloat(document.getElementById('explorePriceMax').value);
      exploreFilteredResults = exploreRankedResults.filter(p => {
        if (p.id === (exploreBaseProduct && exploreBaseProduct.id)) return false;
        const price = p.price != null ? Number(p.price) : null;
        if (price === null) return true;
        if (!isNaN(min) && price < min) return false;
        if (!isNaN(max) && price > max) return false;
        return true;
      });
      exploreSlotProducts = [
        exploreBaseProduct,
        exploreFilteredResults[0] || null,
        exploreFilteredResults[1] || null,
        exploreFilteredResults[2] || null,
        exploreFilteredResults[3] || null,
      ];
      exploreSlotLocked      = [true, false, false, false, false];
      exploreSlotColorLocked = [false, false, false, false, false];
      exploreColorFilterColors.clear();
      exploreNextIndex    = Math.min(4, exploreFilteredResults.length);
      exploreRollHistory  = [];
      renderExploreSlots();
    }

    // ── Explore roll ─────────────────────────────────────────────────────
    async function doExploreRoll() {
      if (exploreFilteredResults.length === 0 || isExploreFading) return;

      const unlockedIndices = new Set(
        exploreSlotProducts.reduce((acc, p, i) => { if (p && !exploreSlotLocked[i]) acc.push(i); return acc; }, [])
      );
      if (unlockedIndices.size === 0) return;
      isExploreFading = true;

      const grid = document.getElementById('exploreGrid');
      grid.querySelectorAll('.product-card').forEach(el => {
        if (unlockedIndices.has(parseInt(el.dataset.slot, 10))) {
          el.style.transition = 'opacity 350ms linear';
          el.style.opacity    = '0';
        }
      });
      await new Promise(r => setTimeout(r, 350));

      exploreRollHistory.push({
        exploreSlotProducts:     [...exploreSlotProducts],
        exploreSlotLocked:       [...exploreSlotLocked],
        exploreSlotColorLocked:  [...exploreSlotColorLocked],
        exploreColorFilterColors: new Set(exploreColorFilterColors),
        exploreNextIndex,
      });
      if (exploreRollHistory.length > 50) exploreRollHistory.shift();

      const lockedIds = new Set(exploreSlotProducts.filter((p, i) => exploreSlotLocked[i] && p).map(p => p.id));
      const shownIds  = new Set(exploreSlotProducts.filter((p, i) => !exploreSlotLocked[i] && p).map(p => p.id));

      const total = exploreFilteredResults.length;
      const fresh = [], stale = [];
      for (let i = 0; i < total; i++) {
        const p = exploreFilteredResults[(exploreNextIndex + i) % total];
        if (lockedIds.has(p.id)) continue;
        (shownIds.has(p.id) ? stale : fresh).push(p);
      }
      let pool = [...fresh, ...stale];

      if (exploreColorFilterColors.size > 0) {
        const hits   = pool.filter(p => p.color && exploreColorFilterColors.has(p.color));
        const misses = pool.filter(p => !p.color || !exploreColorFilterColors.has(p.color));
        pool = [...hits, ...misses];
      }
      pool = pool.slice(0, unlockedIndices.size);
      exploreNextIndex = (exploreNextIndex + Math.max(unlockedIndices.size, 1)) % total;

      let poolIdx = 0;
      exploreSlotProducts = exploreSlotProducts.map((p, i) => {
        if (!exploreSlotLocked[i] && poolIdx < pool.length) return pool[poolIdx++];
        return p;
      });

      renderExploreSlots(unlockedIndices);
      setTimeout(() => { isExploreFading = false; }, 700);
    }

    async function doExploreUndo() {
      if (exploreRollHistory.length === 0 || isExploreFading) return;
      isExploreFading = true;

      const unlockedIndices = new Set(
        exploreSlotProducts.reduce((acc, p, i) => { if (p && !exploreSlotLocked[i]) acc.push(i); return acc; }, [])
      );
      const grid = document.getElementById('exploreGrid');
      grid.querySelectorAll('.product-card').forEach(el => {
        if (unlockedIndices.has(parseInt(el.dataset.slot, 10))) {
          el.style.transition = 'opacity 350ms linear';
          el.style.opacity    = '0';
        }
      });
      await new Promise(r => setTimeout(r, 350));

      const snap = exploreRollHistory.pop();
      exploreSlotProducts      = snap.exploreSlotProducts;
      exploreSlotLocked        = snap.exploreSlotLocked;
      exploreSlotColorLocked   = snap.exploreSlotColorLocked;
      exploreColorFilterColors = snap.exploreColorFilterColors;
      exploreNextIndex         = snap.exploreNextIndex;
      renderExploreSlots(unlockedIndices);
      setTimeout(() => { isExploreFading = false; }, 700);
    }

    // ── ADD PRODUCT — replace top slot and scroll back up ────────────────
    function addProductFromExplore(exploreSlotIdx) {
      const product = exploreSlotProducts[exploreSlotIdx];
      if (!product || exploreSourceSlotIdx === null) return;

      const topSlot = slots[exploreSourceSlotIdx];
      if (!topSlot) return;

      // If the source slot was locked (original collection product), convert it
      // to a picker slot so it can hold the new product
      if (topSlot.type === 'locked') {
        topSlot.type         = 'picker';
        topSlot.category     = product.category || null;
        topSlot.resultsCache = null;
        topSlot.lastQuery    = null;
        topSlot.resultIdx    = 0;
      }

      topSlot.product = product;
      topSlot.locked  = false;
      savedSlots[exploreSourceSlotIdx] = (exploreSourceSlotIdx === 0);

      renderAll();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── Event delegation — top section ───────────────────────────────────
    document.getElementById('cgProductsGrid').addEventListener('click', function (e) {

      // Category row selection
      const catRow = e.target.closest('.picker-cat-row');
      if (catRow) {
        const idx = parseInt(catRow.dataset.slotIdx, 10);
        const cat = catRow.dataset.cat;
        slots[idx].category = slots[idx].category === cat ? null : cat;
        slots[idx].resultsCache = null;
        slots[idx].resultIdx    = 0;
        renderAll();
        return;
      }

      // Add picker slot (+)
      const addBtn = e.target.closest('.picker-add-btn');
      if (addBtn) {
        e.stopPropagation();
        const idx = parseInt(addBtn.dataset.slotIdx, 10);
        slots.splice(idx + 1, 0, newPickerSlot());
        savedSlots.splice(idx + 1, 0, false);
        slotMaterials.splice(idx + 1, 0, randomMaterial());
        slotMaterialLocked.splice(idx + 1, 0, false);
        slotColorLocked.splice(idx + 1, 0, false);
        renderAll();
        return;
      }

      // Dismiss generated product
      const dismissBtn = e.target.closest('.cg-dismiss-btn');
      if (dismissBtn) {
        e.stopPropagation();
        const idx = parseInt(dismissBtn.dataset.slotIdx, 10);
        slots.splice(idx, 1);
        savedSlots.splice(idx, 1);
        slotMaterials.splice(idx, 1);
        slotMaterialLocked.splice(idx, 1);
        slotColorLocked.splice(idx, 1);
        if (slots.length === 0) {
          slots.push(newPickerSlot()); savedSlots.push(false);
          slotMaterials.push(randomMaterial()); slotMaterialLocked.push(false);
          slotColorLocked.push(false);
        }
        // Leftmost slot (new index 0) always stays saved
        if (savedSlots.length > 0) savedSlots[0] = true;
        renderAll();
        return;
      }

      // Insert new picker slot from gap + button
      const insertBtn = e.target.closest('.cg-slot-insert-btn');
      if (insertBtn) {
        e.stopPropagation();
        const afterIdx = parseInt(insertBtn.dataset.insertAfter, 10);
        slots.splice(afterIdx + 1, 0, newPickerSlot());
        savedSlots.splice(afterIdx + 1, 0, false);
        slotMaterials.splice(afterIdx + 1, 0, randomMaterial());
        slotMaterialLocked.splice(afterIdx + 1, 0, false);
        slotColorLocked.splice(afterIdx + 1, 0, false);
        renderAll();
        return;
      }

      // Toggle color lock
      const colorLockBtn = e.target.closest('.cg-color-lock-btn');
      if (colorLockBtn) {
        e.stopPropagation();
        const idx = parseInt(colorLockBtn.dataset.slotIdx, 10);
        slotColorLocked[idx] = !slotColorLocked[idx];
        renderAll();
        return;
      }

      // Toggle material lock
      const materialLockBtn = e.target.closest('.cg-material-lock-btn');
      if (materialLockBtn) {
        e.stopPropagation();
        const idx = parseInt(materialLockBtn.dataset.slotIdx, 10);
        slotMaterialLocked[idx] = !slotMaterialLocked[idx];
        renderAll();
        return;
      }

      // Lock / unlock generated slot
      const lockBtn = e.target.closest('.cg-lock-btn');
      if (lockBtn) {
        e.stopPropagation();
        const idx = parseInt(lockBtn.dataset.slotIdx, 10);
        if (slots[idx] && slots[idx].type === 'picker') {
          slots[idx].locked = !slots[idx].locked;
          renderAll();
        }
        return;
      }

      // Unlock a collection-locked slot (convert to editable)
      const lockedUnlockBtn = e.target.closest('.cg-locked-unlock-btn');
      if (lockedUnlockBtn) {
        e.stopPropagation();
        const idx = parseInt(lockedUnlockBtn.dataset.slotIdx, 10);
        const slot = slots[idx];
        if (slot && slot.type === 'locked') {
          slot.type        = 'picker';
          slot.category    = slot.product ? (slot.product.category || null) : null;
          slot.locked      = false;
          slot.resultsCache = null;
          slot.lastQuery   = null;
          slot.resultIdx   = 0;
          renderAll();
        }
        return;
      }

      // Save button — open modal
      const saveBtn = e.target.closest('.cg-save-btn');
      if (saveBtn) {
        e.stopPropagation();
        const idx = parseInt(saveBtn.dataset.slotIdx, 10);
        const slot = slots[idx];
        if (!slot) return;
        const product = slot.type === 'locked' ? slot.product : slot.product;
        if (product) openSaveModal(product, idx);
        return;
      }

      // Explore More button
      const exploreBtn = e.target.closest('.explore-more-btn');
      if (exploreBtn) {
        e.stopPropagation();
        const idx = parseInt(exploreBtn.dataset.slotIdx, 10);
        openExploreSection(idx);
        return;
      }
    });

    // ── Event delegation — explore section ───────────────────────────────
    document.getElementById('exploreGrid').addEventListener('click', function (e) {

      // Lock / unlock explore slot
      const lockBtn = e.target.closest('.cg-explore-lock-btn');
      if (lockBtn) {
        e.stopPropagation();
        const slotIdx = parseInt(lockBtn.dataset.slot, 10);
        exploreSlotLocked[slotIdx] = !exploreSlotLocked[slotIdx];

        if (!exploreSlotLocked[slotIdx] && exploreSlotColorLocked[slotIdx]) {
          exploreSlotColorLocked[slotIdx] = false;
          exploreColorFilterColors.clear();
          exploreSlotProducts.forEach((p, i) => {
            if (p && exploreSlotColorLocked[i] && p.color) exploreColorFilterColors.add(p.color);
          });
        }

        const card = lockBtn.closest('.product-card');
        card.querySelectorAll('.cg-explore-lock-btn').forEach(btn => {
          btn.innerHTML = exploreSlotLocked[slotIdx] ? LOCK_CLOSED_SVG : LOCK_OPEN_SVG;
          btn.setAttribute('aria-label', exploreSlotLocked[slotIdx] ? 'Unlock' : 'Lock');
        });
        card.classList.toggle('is-locked', exploreSlotLocked[slotIdx]);
        return;
      }

      // ADD PRODUCT
      const addBtn = e.target.closest('.add-product-btn');
      if (addBtn) {
        e.stopPropagation();
        const slotIdx = parseInt(addBtn.dataset.slot, 10);
        addProductFromExplore(slotIdx);
        return;
      }

      // Dismiss (X) button on explore card
      const dismissBtn = e.target.closest('.cg-explore-dismiss-btn');
      if (dismissBtn) {
        e.stopPropagation();
        const slotIdx = parseInt(dismissBtn.dataset.slot, 10);
        exploreSlotProducts[slotIdx]    = null;
        exploreSlotLocked[slotIdx]      = false;
        exploreSlotColorLocked[slotIdx] = false;
        renderExploreSlots();
        return;
      }

      // Save button on explore card
      const exploreSaveBtn = e.target.closest('.cg-explore-save-btn');
      if (exploreSaveBtn) {
        e.stopPropagation();
        const slotIdx = parseInt(exploreSaveBtn.dataset.slot, 10);
        const product = exploreSlotProducts[slotIdx];
        if (product) openSaveModal(product, null);
        return;
      }
    });

    // ── Drag-to-reorder (explore section) ───────────────────────────────
    document.getElementById('exploreGrid').addEventListener('mousedown', function (e) {
      const handle = e.target.closest('.dots-grid');
      if (!handle) return;
      const card = handle.closest('.product-card');
      if (!card || card.dataset.slot === undefined) return;
      e.preventDefault();
      e.stopPropagation();

      const slotIdx = parseInt(card.dataset.slot, 10);
      const rect    = card.getBoundingClientRect();

      const allCards = Array.from(document.getElementById('exploreScrollWrapper').querySelectorAll('.product-card'));
      let gapW = 16;
      for (let k = 0; k + 1 < allCards.length; k++) {
        const ra = allCards[k].getBoundingClientRect();
        const rb = allCards[k + 1].getBoundingClientRect();
        const g  = rb.left - ra.right;
        if (g >= 0) { gapW = g; break; }
      }
      const shiftW = rect.width + gapW;

      const ghost = card.cloneNode(true);
      Object.assign(ghost.style, {
        position: 'fixed', width: rect.width + 'px', height: rect.height + 'px',
        top: rect.top + 'px', left: rect.left + 'px',
        opacity: '0.88', pointerEvents: 'none', zIndex: '9999',
        transition: 'none', margin: '0',
        boxShadow: '0 8px 32px rgba(49,34,12,0.22)',
        borderRadius: 'var(--card-radius)',
      });
      document.body.appendChild(ghost);
      card.style.opacity       = '0';
      card.style.pointerEvents = 'none';
      document.body.style.userSelect = 'none';

      dndExplore = { slotIdx, dropIdx: slotIdx, ghost, card, shiftW,
                     offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top };
    });

    document.addEventListener('mousemove', function (e) {
      if (!dndExplore) return;
      dndExplore.ghost.style.left = (e.clientX - dndExplore.offsetX) + 'px';
      dndExplore.ghost.style.top  = (e.clientY - dndExplore.offsetY) + 'px';

      const cards = Array.from(document.getElementById('exploreGrid').querySelectorAll('.product-card'));
      let bestIdx = dndExplore.slotIdx, minDist = Infinity;
      cards.forEach(c => {
        const ci = parseInt(c.dataset.slot, 10);
        if (ci === dndExplore.slotIdx) return;
        const r  = c.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const dist = Math.abs(e.clientX - cx);
        if (dist < minDist) { minDist = dist; bestIdx = ci; }
      });

      if (bestIdx === dndExplore.dropIdx) return;
      dndExplore.dropIdx = bestIdx;
      cards.forEach(c => {
        const ci = parseInt(c.dataset.slot, 10);
        if (ci === dndExplore.slotIdx) return;
        c.style.transition = 'transform 0.18s ease';
        if (dndExplore.slotIdx < dndExplore.dropIdx) {
          c.style.transform = (ci > dndExplore.slotIdx && ci <= dndExplore.dropIdx)
            ? `translateX(-${dndExplore.shiftW}px)` : '';
        } else {
          c.style.transform = (ci >= dndExplore.dropIdx && ci < dndExplore.slotIdx)
            ? `translateX(${dndExplore.shiftW}px)` : '';
        }
      });
    });

    document.addEventListener('mouseup', function () {
      if (!dndExplore) return;
      const { slotIdx, dropIdx } = dndExplore;
      dndExplore.ghost.remove();
      document.getElementById('exploreGrid')
        .querySelectorAll('.product-card')
        .forEach(c => { c.style.transform = ''; c.style.transition = '';
                        c.style.opacity = ''; c.style.pointerEvents = ''; });
      document.body.style.userSelect = '';
      dndExplore = null;

      if (slotIdx !== dropIdx) {
        const reorder = arr => { const [item] = arr.splice(slotIdx, 1); arr.splice(dropIdx, 0, item); };
        reorder(exploreSlotProducts);
        reorder(exploreSlotLocked);
        reorder(exploreSlotColorLocked);
        renderExploreSlots(false);
      }
    });

    // ── Buttons + spacebar ────────────────────────────────────────────────
    // ── Save changes → update collection and navigate back ───────────────
    function saveChanges() {
      const cs   = getOutfits();
      const coll = cs.find(c => c.id === collectionId);
      if (!coll) return;
      coll.products = slots.filter(s => s.product != null).map(s => s.product);
      const nameVal = document.getElementById('cgCollectionName').value.trim();
      if (nameVal) { coll.name = nameVal; }
      else if (!coll.name) { coll.name = 'New Outfit'; }
      saveOutfits(cs);
      window.location.href = 'collection.html?id=' + encodeURIComponent(collectionId);
    }

    document.getElementById('cgGenerateBtn').addEventListener('click', doGenerate);
    document.getElementById('cgNextBtn').addEventListener('click', doGenerate);
    document.getElementById('cgPrevBtn').addEventListener('click', doUndo);
    document.getElementById('saveChangesBtn').addEventListener('click', saveChanges);

    document.getElementById('exploreRollBtn').addEventListener('click', doExploreRoll);
    document.getElementById('exploreNextBtn').addEventListener('click', doExploreRoll);
    document.getElementById('explorePrevBtn').addEventListener('click', doExploreUndo);
    document.getElementById('explorePriceSearchBtn').addEventListener('click', applyExplorePriceFilter);

    document.addEventListener('keydown', function (e) {
      if (e.code === 'Space' && !e.target.matches('input, textarea, [contenteditable]')) {
        e.preventDefault();
        const exploreVisible = document.getElementById('exploreSection').classList.contains('is-visible');
        if (exploreVisible && window.scrollY > document.getElementById('exploreSection').offsetTop - window.innerHeight * 0.5) {
          doExploreRoll();
        } else {
          doGenerate();
        }
      }
    });

    // Dynamic placeholder for style search (random aesthetic + occasion on each load)
    (function () {
      const aesthetics = ['cottagecore','Y2K','indie','coquette','grunge','edgy','academia','minimalist','boho'];
      const occasions  = ['workout','wedding','black tie','business casual','casual','formal','semi-formal','cocktail'];
      const a = aesthetics[Math.floor(Math.random() * aesthetics.length)];
      const o = occasions[Math.floor(Math.random() * occasions.length)];
      document.getElementById('cgStyleInput').placeholder = 'e.g. “' + a + '” or “' + o + '”';
    })();

    // Style search: Enter clears cache and re-generates
    document.getElementById('cgStyleInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        slots.forEach(s => { if (s.type === 'picker') s.resultsCache = null; });
        doGenerate();
      }
    });

    // Click-drag scroll for both wrappers
    ['cgScrollWrapper', 'exploreScrollWrapper'].forEach(function (id) {
      const scroller = document.getElementById(id);
      if (!scroller) return;
      let isDown = false, startX, scrollLeft;
      scroller.addEventListener('mousedown', function (e) {
        isDown = true; scroller.style.cursor = 'grabbing';
        startX = e.pageX - scroller.offsetLeft; scrollLeft = scroller.scrollLeft;
      });
      document.addEventListener('mouseup', function () { isDown = false; scroller.style.cursor = ''; });
      scroller.addEventListener('mouseleave', function () { isDown = false; scroller.style.cursor = ''; });
      scroller.addEventListener('mousemove', function (e) {
        if (!isDown) return;
        e.preventDefault();
        scroller.scrollLeft = scrollLeft - (e.pageX - scroller.offsetLeft - startX) * 1.2;
      });
    });

    // ── Save modal ────────────────────────────────────────────────────────
    let currentSaveProduct  = null;
    let currentSaveSlotIdx  = null;

    function renderModalOutfits() {
      const list = document.getElementById('saveModalList');
      const outfits = getOutfits();
      if (outfits.length === 0) {
        list.innerHTML = '<p style="font-family:\'Manrope-Regular\',sans-serif;font-size:14px;color:var(--muted);padding:6px 0;">No outfits yet.</p>';
        return;
      }
      list.innerHTML = outfits.map(coll => {
        const saved   = currentSaveProduct && coll.products.some(p => p.id === currentSaveProduct.id);
        const nameEsc = coll.name.replace(/&/g, '&amp;').replace(/</g, '&lt;');
        const thumb   = coll.products[0]
          ? `<img src="${coll.products[0].image_url}" style="width:52px;height:52px;object-fit:cover;border-radius:6px;flex-shrink:0;" alt="">`
          : `<div class="save-outfit-thumb"></div>`;
        return `<div class="save-outfit-item${saved ? ' is-saved' : ''}" data-coll-id="${coll.id}">
          ${thumb}
          <span class="save-outfit-name">${nameEsc}</span>
          ${saved
            ? `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><polyline points="2,7 5,10.5 12,3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`
            : `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="7" y1="2" x2="7" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="2" y1="7" x2="12" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`
          }        </div>`;
      }).join('');
    }

    function openSaveModal(product, slotIdx) {
      currentSaveProduct = product || null;
      currentSaveSlotIdx = slotIdx != null ? slotIdx : null;
      renderModalOutfits();
      document.getElementById('saveModal').classList.add('is-open');
      document.getElementById('saveModalInput').focus();
    }

    function closeSaveModal() {
      const modal = document.getElementById('saveModal');
      modal.classList.remove('is-open', 'is-name-mode');
      document.querySelector('#saveModal .save-modal-title').textContent = 'Save to outfit';
      document.getElementById('saveModalList').style.display = '';
      document.getElementById('saveModalInput').placeholder = 'New outfit name';
      currentSaveProduct = null;
      currentSaveSlotIdx = null;
    }

    document.getElementById('saveModalClose').addEventListener('click', closeSaveModal);
    document.getElementById('saveModal').addEventListener('click', function (e) {
      if (e.target === this) closeSaveModal();
    });

    document.getElementById('saveModalList').addEventListener('click', function (e) {
      const item = e.target.closest('.save-outfit-item');
      if (!item || !currentSaveProduct) return;
      const outfits = getOutfits();
      const coll        = outfits.find(c => c.id === item.dataset.collId);
      if (!coll) return;
      const idx = coll.products.findIndex(p => p.id === currentSaveProduct.id);
      if (idx >= 0) {
        coll.products.splice(idx, 1);
        // If this is the current collection and we know the slot, mark unsaved
        if (coll.id === collectionId && currentSaveSlotIdx !== null && currentSaveSlotIdx !== 0) {
          savedSlots[currentSaveSlotIdx] = false;
          const card = document.querySelector(`#cgProductsGrid [data-slot-idx="${currentSaveSlotIdx}"]`);
          if (card) card.classList.remove('is-saved');
        }
      } else {
        coll.products.push(currentSaveProduct);
        // If this is the current collection, mark slot as saved
        if (coll.id === collectionId && currentSaveSlotIdx !== null) {
          savedSlots[currentSaveSlotIdx] = true;
          const card = document.querySelector(`#cgProductsGrid [data-slot-idx="${currentSaveSlotIdx}"]`);
          if (card) card.classList.add('is-saved');
        }
      }
      saveOutfits(outfits);
      closeSaveModal();
    });

    document.getElementById('saveModalAddBtn').addEventListener('click', function () {
      const input = document.getElementById('saveModalInput');
      const name  = input.value.trim();
      if (!name) return;

      const outfits = getOutfits();
      const newColl = {
        id:       Date.now().toString(36) + Math.random().toString(36).slice(2),
        name,
        products: currentSaveProduct ? [currentSaveProduct] : [],
      };
      outfits.push(newColl);
      saveOutfits(outfits);
      input.value = '';
      renderModalOutfits();
    });

    document.getElementById('saveModalInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') document.getElementById('saveModalAddBtn').click();
    });

    // ── Drag-to-reorder (top-half slots) ────────────────────────────────
    let dnd = null;

    document.getElementById('cgProductsGrid').addEventListener('mousedown', function (e) {
      const handle = e.target.closest('.dots-grid');
      if (!handle) return;
      const card = handle.closest('.product-card');
      if (!card || card.dataset.slotIdx === undefined) return;
      if (slots.some(s => !s.product)) return;
      if (document.querySelector('.picker-slot')) return;
      e.preventDefault();
      e.stopPropagation();

      const slotIdx = parseInt(card.dataset.slotIdx, 10);
      const rect    = card.getBoundingClientRect();

      const allCardsForGap = Array.from(document.getElementById('cgScrollWrapper').querySelectorAll('.product-card, .picker-slot'));
      let gapW = 16;
      for (let k = 0; k + 1 < allCardsForGap.length; k++) {
        const ra = allCardsForGap[k].getBoundingClientRect();
        const rb = allCardsForGap[k + 1].getBoundingClientRect();
        const g  = rb.left - ra.right;
        if (g >= 0) { gapW = g; break; }
      }
      const shiftW = rect.width + gapW;

      const ghost = card.cloneNode(true);
      Object.assign(ghost.style, {
        position: 'fixed', width: rect.width + 'px', height: rect.height + 'px',
        top: rect.top + 'px', left: rect.left + 'px',
        opacity: '0.88', pointerEvents: 'none', zIndex: '9999',
        transition: 'none', margin: '0',
        boxShadow: '0 8px 32px rgba(49,34,12,0.22)',
        borderRadius: 'var(--card-radius)',
      });
      document.body.appendChild(ghost);

      card.style.opacity = '0';
      card.style.pointerEvents = 'none';
      document.body.style.userSelect = 'none';

      dnd = { slotIdx, dropIdx: slotIdx, ghost, card, shiftW,
              offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top };
    });

    document.addEventListener('mousemove', function (e) {
      if (!dnd) return;
      dnd.ghost.style.left = (e.clientX - dnd.offsetX) + 'px';
      dnd.ghost.style.top  = (e.clientY - dnd.offsetY) + 'px';

      const grid  = document.getElementById('cgProductsGrid');
      const cards = Array.from(grid.querySelectorAll('.product-card, .picker-slot'));
      let bestIdx = dnd.slotIdx, minDist = Infinity;
      cards.forEach(c => {
        const ci = parseInt(c.dataset.slotIdx, 10);
        if (ci === dnd.slotIdx) return;
        const r  = c.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const dist = Math.abs(e.clientX - cx);
        if (dist < minDist) { minDist = dist; bestIdx = ci; }
      });

      if (bestIdx === dnd.dropIdx) return;
      dnd.dropIdx = bestIdx;

      cards.forEach(c => {
        const ci = parseInt(c.dataset.slotIdx, 10);
        if (ci === dnd.slotIdx) return;
        c.style.transition = 'transform 0.18s ease';
        if (dnd.slotIdx < dnd.dropIdx) {
          c.style.transform = (ci > dnd.slotIdx && ci <= dnd.dropIdx)
            ? `translateX(-${dnd.shiftW}px)` : '';
        } else {
          c.style.transform = (ci >= dnd.dropIdx && ci < dnd.slotIdx)
            ? `translateX(${dnd.shiftW}px)` : '';
        }
      });
    });

    document.addEventListener('mouseup', function () {
      if (!dnd) return;
      const { slotIdx, dropIdx } = dnd;

      dnd.ghost.remove();
      document.getElementById('cgProductsGrid')
        .querySelectorAll('.product-card, .picker-slot')
        .forEach(c => { c.style.transform = ''; c.style.transition = '';
                        c.style.opacity = ''; c.style.pointerEvents = ''; });
      document.body.style.userSelect = '';
      dnd = null;

      if (slotIdx !== dropIdx) {
        const [ms]  = slots.splice(slotIdx, 1);
        const [mv]  = savedSlots.splice(slotIdx, 1);
        const [mm]  = slotMaterials.splice(slotIdx, 1);
        const [mml] = slotMaterialLocked.splice(slotIdx, 1);
        const [mcl] = slotColorLocked.splice(slotIdx, 1);
        slots.splice(dropIdx, 0, ms);
        savedSlots.splice(dropIdx, 0, mv);
        slotMaterials.splice(dropIdx, 0, mm);
        slotMaterialLocked.splice(dropIdx, 0, mml);
        slotColorLocked.splice(dropIdx, 0, mcl);
      }
      renderAll();
    });

    // ── Drag-to-reorder (explore section) ───────────────────────────────
    let dndExplore = null;

    document.getElementById('exploreGrid').addEventListener('mousedown', function (e) {

      if (!card || card.dataset.slot === undefined) return;
      e.preventDefault();
      e.stopPropagation();

      for (let k = 0; k + 1 < allCardsForGap.length; k++) {

      document.body.appendChild(ghost);

    document.addEventListener('mousemove', function (e) {

      dndExplore.ghost.style.top  = (e.clientY - dndExplore.offsetY) + 'px';

      cards.forEach(c => {

        if (dist < minDist) { minDist = dist; bestIdx = ci; }
      });

      if (bestIdx === dndExplore.dropIdx) return;
      dndExplore.dropIdx = bestIdx;

      cards.forEach(c => {
        const ci = parseInt(c.dataset.slot, 10);
        if (ci === dndExplore.slotIdx) return;
        c.style.transition = 'transform 0.18s ease';
        if (dndExplore.slotIdx < dndExplore.dropIdx) {
          c.style.transform = (ci > dndExplore.slotIdx && ci <= dndExplore.dropIdx)
            ? `translateX(-${dndExplore.shiftW}px)` : '';
        } else {
          c.style.transform = (ci >= dndExplore.dropIdx && ci < dndExplore.slotIdx)
            ? `translateX(${dndExplore.shiftW}px)` : '';
        }
      });

    document.addEventListener('mouseup', function () {
      if (!dndExplore) return;
      const { slotIdx, dropIdx } = dndExplore;
      dndExplore.ghost.remove();
      document.getElementById('exploreGrid')
        .querySelectorAll('.product-card')
        .forEach(c => { c.style.transform = ''; c.style.transition = '';
                        c.style.opacity = ''; c.style.pointerEvents = ''; });
      document.body.style.userSelect = '';
      dndExplore = null;

      if (slotIdx !== dropIdx) {
        const reorder = arr => { const [item] = arr.splice(slotIdx, 1); arr.splice(dropIdx, 0, item); };
        reorder(exploreSlotProducts);
        reorder(exploreSlotLocked);
        reorder(exploreSlotColorLocked);
        renderExploreSlots(false);
      }
    });

    // ── Lock scroll when all cards fit (no overflow) ────────────────────
    (function () {
      function makeScrollLock(wrapperId, trackId) {
        const wrapper = document.getElementById(wrapperId);
        const track   = document.getElementById(trackId);
        if (!wrapper || !track) return;
        function sync() {
          requestAnimationFrame(() => {
            wrapper.style.overflowX = wrapper.scrollWidth <= wrapper.clientWidth + 1 ? 'hidden' : '';
          });
        }
        new ResizeObserver(sync).observe(wrapper);
        new MutationObserver(sync).observe(track, { childList: true });
      }
      makeScrollLock('cgScrollWrapper',    'cgProductsGrid');
      makeScrollLock('exploreScrollWrapper', 'exploreGrid');
    })();

    // ── Back to top ──────────────────────────────────────────────────────
    document.getElementById('backToTopBtn').addEventListener('click', function () {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });


    // ── Insert button side detection ─────────────────────────────────────
    (function () {
      const grid = document.getElementById('cgProductsGrid');
      let activeGap = null;

      function setGap(gap) {
        if (gap === activeGap) return;
        if (activeGap) activeGap.classList.remove('show-btn');
        activeGap = gap || null;
        if (activeGap) activeGap.classList.add('show-btn');
      }

      grid.addEventListener('mousemove', function (e) {
        const card = e.target.closest('.product-card, .picker-slot');
        const gap  = e.target.closest('.cg-slot-gap');
        if (card) {
          const r    = card.getBoundingClientRect();
          const relX = (e.clientX - r.left) / r.width;
          const relY = (e.clientY - r.top)  / r.height;
          if (relY < 0.3 || relY > 0.7) { setGap(null); return; }
          if (relX > 0.2 && relX < 0.8) { setGap(null); return; }
          const sibling = relX <= 0.2 ? card.previousElementSibling : card.nextElementSibling;
          setGap(sibling && sibling.classList.contains('cg-slot-gap') ? sibling : null);
        } else if (gap) {
          setGap(gap);
        } else {
          setGap(null);
        }
      });

      grid.addEventListener('mouseleave', function () { setGap(null); });
    })();

    // ── Edit outfit name (always-editable input) ─────────────────────────
    document.getElementById('editNamePencil').addEventListener('click', function () {
      const input = document.getElementById('cgCollectionName');
      input.focus();
      input.select();
    });

    // Auto-resize the input to match its text content
    (function () {
      const input  = document.getElementById('cgCollectionName');
      const canvas = document.createElement('canvas');
      const ctx    = canvas.getContext('2d');

      function resizeName() {
        const cs = window.getComputedStyle(input);
        ctx.font = cs.fontWeight + ' ' + cs.fontSize + ' ' + cs.fontFamily;
        const text = input.value || input.placeholder;
        input.style.width = Math.max(120, Math.ceil(ctx.measureText(text).width) + 16) + 'px';
      }

      input.addEventListener('input', resizeName);
      requestAnimationFrame(resizeName);
    })();

    // Auto-save name on blur or Enter
    document.getElementById('cgCollectionName').addEventListener('blur', function () {
      const name = this.value.trim();
      const cs   = getOutfits();
      const coll = cs.find(c => c.id === collectionId);
      if (coll) {
        coll.name = name || 'New Outfit';
        saveOutfits(cs);
        document.title = coll.name + ' — The Choice Architect';
      }
    });

    document.getElementById('cgCollectionName').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); this.blur(); }
    });
  </script>
